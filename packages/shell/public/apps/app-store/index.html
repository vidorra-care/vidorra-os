<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Store</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f2f2f7;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #1c1c1e;
      text-align: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      background: #0066cc;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      font-size: 40px;
      font-weight: 700;
      color: white;
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #636366; line-height: 1.5; max-width: 300px; }
    .badge {
      margin-top: 20px;
      padding: 6px 14px;
      background: rgba(0,102,204,0.1);
      border-radius: 20px;
      font-size: 12px;
      color: #0066cc;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="icon">A</div>
  <h1>App Store</h1>
  <p>Discover and install applications for your Vidorra OS desktop.</p>
  <div class="badge">Phase 5 — Coming Soon</div>
</body>
</html>
